name: Deploy to Hostinger

on:
  push:
    branches:
      - main
      - master # Triggers on either main or master

jobs:
  build-and-deploy:
    name: Build and Deploy to Hostinger FTP
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm install
        
      - name: Build Project
        run: npm run build
        
      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # The local directory containing the built React files
          local-dir: ./dist/apps/web/
          # The destination directory on your Hostinger server
          # If your FTP user lands exactly inside public_html, change this to ./
          server-dir: /
